  <style>
    /* ============================================================
       COLORS — pulled from the original Linktree theme.
       ============================================================ */
    :root {
      --page:        #ded3e0;  /* soft purple-gray behind the card */
      --card:        #efe7df;  /* warm cream card background        */
      --card-border: #d6cbd2;  /* faint border around the card      */
      --btn:         #7f6f9b;  /* muted purple button fill          */
      --btn-hover:   #6d5d88;  /* darker purple on hover            */
      --btn-text:    #13160f;  /* near-black button text            */
      --btn-shadow:  #a79cba;  /* soft purple button shadow         */
      --heading:     #2e2740;  /* deep plum for the name            */
      --muted:       #6b6156;  /* warm gray for the tagline         */
      --social:      #7f6f9b;  /* social icon color                 */
      --radius:      10px;     /* ROUNDED_SM button corners         */
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI",
                   Roboto, Helvetica, Arial, sans-serif;
      background: var(--page);
      color: var(--heading);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 2.5rem 1.25rem 3.5rem;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ---- The bounded card holding the whole page ---- */
    .card {
      width: 100%;
      max-width: 560px;
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      box-shadow: 0 12px 40px rgba(46, 39, 64, 0.18);
      overflow: hidden;
    }

    /* ---- Hero image that fades into the card at the bottom ---- */
    .hero {
      display: block;
      width: 100%;
      height: 480px;
      object-fit: cover;
      object-position: center;
      /* Fade the lower portion of the image into the card background */
      -webkit-mask-image: linear-gradient(to bottom, #000 55%, transparent 100%);
      mask-image: linear-gradient(to bottom, #000 55%, transparent 100%);
    }

    /* ---- Content sits below the hero, pulled up into the fade ---- */
    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 1.75rem 2.25rem;
      margin-top: -2.5rem;
    }

    h1 {
      font-size: 1.65rem;
      font-weight: 800;
      letter-spacing: -0.01em;
      color: var(--heading);
      text-align: center;
    }
    .tagline {
      color: var(--muted);
      font-size: 1rem;
      margin-top: 0.4rem;
      text-align: center;
      max-width: 34ch;
    }

    /* ---- Social icon row ---- */
    .socials {
      display: flex;
      gap: 1.35rem;
      margin-top: 1.25rem;
    }
    .socials a {
      color: var(--social);
      display: inline-flex;
      transition: transform 0.12s ease, color 0.12s ease;
    }
    .socials a:hover { color: var(--btn-hover); transform: translateY(-2px); }
    .socials svg { width: 26px; height: 26px; fill: currentColor; }

    /* ---- Link buttons (centered text, purple fill) ---- */
    .links {
      width: 100%;
      margin-top: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .link {
      display: block;
      text-align: center;
      background: var(--btn);
      color: var(--btn-text);
      border-radius: var(--radius);
      padding: 1.05rem 1.25rem;
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      box-shadow: 0 3px 0 var(--btn-shadow);
      transition: transform 0.12s ease, background 0.12s ease, box-shadow 0.12s ease;
    }
    .link:hover {
      background: var(--btn-hover);
      transform: translateY(-2px);
      box-shadow: 0 5px 0 var(--btn-shadow);
    }
    .link:active {
      transform: translateY(1px);
      box-shadow: 0 2px 0 var(--btn-shadow);
    }

    footer {
      margin-top: 2.25rem;
      color: var(--muted);
      font-size: 0.8rem;
      text-align: center;
    }
  </style>
</head>
